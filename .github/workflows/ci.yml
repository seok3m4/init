name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

jobs:
  docs-harness:
    name: Docs and Harness
    runs-on: windows-latest
    outputs:
      impacted_roles_json: ${{ steps.ownership.outputs.roles_json }}
      impacted_roles_csv: ${{ steps.ownership.outputs.roles_csv }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify docs, contracts, and folder structure
        shell: pwsh
        run: ./scripts/verify-docs.ps1
      - name: Verify changed-file ownership
        id: ownership
        shell: pwsh
        run: ./scripts/verify-ownership-auto.ps1
      - name: Verify implementation baseline
        shell: pwsh
        run: ./scripts/verify-baseline.ps1
      - name: Verify package baseline
        shell: pwsh
        run: ./scripts/verify-package-baseline.ps1

  role-harness:
    name: Role Harness (${{ matrix.role }})
    needs: docs-harness
    if: needs.docs-harness.outputs.impacted_roles_json != '[]'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        role: ${{ fromJson(needs.docs-harness.outputs.impacted_roles_json) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Backend API dependencies when present
        shell: bash
        run: |
          if [ -f backend/api/package-lock.json ]; then
            npm ci --prefix backend/api
          else
            echo "backend/api/package-lock.json not found; skipping backend API dependency install"
          fi
      - name: Verify changed-file ownership without PowerShell
        shell: bash
        run: bash scripts/verify-ownership-auto.sh
      - name: Verify local workflow without PowerShell
        shell: bash
        run: bash scripts/check-local.sh -Role ${{ matrix.role }} -SkipOwnership

  extended-harness:
    name: Extended Local Harness
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Prisma
        shell: pwsh
        run: ./scripts/verify-prisma.ps1
      - name: Verify Dev Auth seed
        shell: pwsh
        run: ./scripts/verify-dev-auth-seed.ps1
      - name: Verify Docker
        shell: pwsh
        run: ./scripts/verify-docker.ps1
      - name: Verify environment examples
        shell: pwsh
        run: ./scripts/verify-env.ps1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/worker/package-lock.json
      - name: Install Backend Worker dependencies
        working-directory: backend/worker
        run: npm ci
      - name: Verify AI golden cases
        shell: pwsh
        run: ./scripts/verify-ai-golden.ps1
      - name: Smoke test
        shell: pwsh
        env:
          SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL }}
        run: ./scripts/smoke-local.ps1

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect Dockerfiles
        id: detect
        shell: bash
        run: |
          mapfile -t files < <(find . -type f -name 'Dockerfile*' \
            ! -path './.git/*' \
            ! -path '*/node_modules/*' \
            ! -path '*/.next/*' \
            ! -path '*/dist/*' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "has_dockerfiles=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfiles found; skipping Docker image build"
          else
            echo "has_dockerfiles=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${files[@]}" > /tmp/dockerfiles.txt
            echo "Detected Dockerfiles:"
            cat /tmp/dockerfiles.txt
          fi
      - name: Build Docker images
        if: steps.detect.outputs.has_dockerfiles == 'true'
        shell: bash
        run: |
          while IFS= read -r dockerfile; do
            context="$(dirname "$dockerfile")"
            name="$(echo "$context" | sed 's#^\./##; s#[^A-Za-z0-9_.-]#-#g' | tr '[:upper:]' '[:lower:]')"
            if [ -z "$name" ] || [ "$name" = "." ]; then
              name="root"
            fi
            docker build -f "$dockerfile" -t "init-ci-${name}:latest" "$context"
          done < /tmp/dockerfiles.txt

  frontend:
    name: Frontend Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Detect package lock
        id: detect
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lock=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lock=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_lock == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        if: steps.detect.outputs.has_lock == 'true'
        run: npm ci
      - name: Typecheck
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run typecheck --if-present
      - name: Lint
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run lint --if-present
      - name: Test
        if: steps.detect.outputs.has_lock == 'true'
        run: npm test --if-present
      - name: Build
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run build --if-present
      - name: Skip empty frontend
        if: steps.detect.outputs.has_lock != 'true'
        run: echo "frontend/package-lock.json not found; skipping frontend npm checks"

  backend-api:
    name: Backend API NestJS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v4
      - name: Detect package lock
        id: detect
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lock=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lock=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_lock == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/api/package-lock.json
            backend/common/package-lock.json
      - name: Build common package
        if: steps.detect.outputs.has_lock == 'true'
        working-directory: backend/common
        run: |
          npm ci
          npm run build
      - name: Install
        if: steps.detect.outputs.has_lock == 'true'
        run: npm ci
      - name: Prisma generate
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run prisma:generate --if-present
      - name: Typecheck
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run typecheck --if-present
      - name: Lint
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run lint --if-present
      - name: Test
        if: steps.detect.outputs.has_lock == 'true'
        run: npm test --if-present
      - name: Build
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run build --if-present
      - name: Skip empty backend API
        if: steps.detect.outputs.has_lock != 'true'
        run: echo "backend/api/package-lock.json not found; skipping backend API npm checks"

  backend-worker:
    name: Backend Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/worker
    steps:
      - uses: actions/checkout@v4
      - name: Detect package lock
        id: detect
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lock=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lock=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_lock == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/worker/package-lock.json
      - name: Install
        if: steps.detect.outputs.has_lock == 'true'
        run: npm ci
      - name: Typecheck
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run typecheck --if-present
      - name: Lint
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run lint --if-present
      - name: Test
        if: steps.detect.outputs.has_lock == 'true'
        run: npm test --if-present
      - name: Build
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run build --if-present
      - name: Skip empty backend worker
        if: steps.detect.outputs.has_lock != 'true'
        run: echo "backend/worker/package-lock.json not found; skipping backend worker npm checks"

  backend-common:
    name: Backend Common
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/common
    steps:
      - uses: actions/checkout@v4
      - name: Detect package lock
        id: detect
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "has_lock=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_lock=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_lock == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/common/package-lock.json
      - name: Install
        if: steps.detect.outputs.has_lock == 'true'
        run: npm ci
      - name: Typecheck
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run typecheck --if-present
      - name: Lint
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run lint --if-present
      - name: Test
        if: steps.detect.outputs.has_lock == 'true'
        run: npm test --if-present
      - name: Build
        if: steps.detect.outputs.has_lock == 'true'
        run: npm run build --if-present
      - name: Skip empty backend common
        if: steps.detect.outputs.has_lock != 'true'
        run: echo "backend/common/package-lock.json not found; skipping backend common npm checks"
